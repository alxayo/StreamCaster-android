name: Release APK

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build FOSS debug APK
        run: ./gradlew --no-daemon :app:assembleFossDebug

      - name: Rename APK for release asset
        run: |
          cp app/build/outputs/apk/foss/debug/app-foss-debug.apk \
            app/build/outputs/apk/foss/debug/streamcaster-foss-debug-${{ github.event.release.tag_name }}.apk

      - name: Upload APK to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/foss/debug/streamcaster-foss-debug-${{ github.event.release.tag_name }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
