name: Release APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to upload APK assets to (for example, v1.2.3)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.event.release.tag_name || github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build FOSS debug APK
        run: ./gradlew --no-daemon :app:assembleFossDebug

      - name: Rename APK for release asset
        run: |
          cp app/build/outputs/apk/foss/debug/app-foss-debug.apk \
            app/build/outputs/apk/foss/debug/streamcaster-foss-debug-${{ github.event.release.tag_name || github.event.inputs.release_tag }}.apk

      - name: Upload APK to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: app/build/outputs/apk/foss/debug/streamcaster-foss-debug-${{ github.event.release.tag_name || github.event.inputs.release_tag }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-attach-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [foss, gms]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (${{ matrix.flavor }})
        run: ./gradlew --no-daemon :app:assemble${{ matrix.flavor == 'foss' && 'Foss' || 'Gms' }}Release

      - name: Rename release APK for asset upload
        id: rename_apk
        run: |
          INPUT_DIR="app/build/outputs/apk/${{ matrix.flavor }}/release"
          INPUT_APK=$(find "$INPUT_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)
          if [ -z "$INPUT_APK" ]; then
            echo "::error::No APK found in $INPUT_DIR"
            exit 1
          fi

          OUTPUT_APK="$INPUT_DIR/streamcaster-${{ matrix.flavor }}-release-${{ github.event.release.tag_name || github.event.inputs.release_tag }}.apk"
          cp "$INPUT_APK" "$OUTPUT_APK"
          echo "output_apk=$OUTPUT_APK" >> "$GITHUB_OUTPUT"

      - name: Upload release APK to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: ${{ steps.rename_apk.outputs.output_apk }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
